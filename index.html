<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buon Anniversario</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#fff5f8);
    overflow:hidden;
}

/* LANDING */
#landing{
    position:fixed;
    width:100%;
    height:100vh;
    background:linear-gradient(135deg,#ffdde1,#ee9ca7);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    z-index:9999;
}

#landing h1{
    font-size:32px;
    margin-bottom:10px;
}

#landing p{
    font-size:18px;
    opacity:0.9;
}

#startBtn{
    margin-top:20px;
    padding:14px 30px;
    font-size:18px;
    border:none;
    border-radius:999px;
    background:white;
    color:#d63384;
    font-weight:bold;
}

/* MAIN */
#main{
    display:none;
    height:100vh;
    text-align:center;
}

h1{
    margin-top:50px;
    padding:0 20px;
    color:#d63384;
    font-size:28px;
}

#area{
    position:relative;
    width:100%;
    height:75vh;
}

button{
    position:absolute;
    padding:16px 32px;
    font-size:20px;
    border:none;
    border-radius:999px;
}

#si{
    background:#28a745;
    color:white;
    left:35%;
    top:40%;
}

#no{
    background:#ff4d6d;
    color:white;
    left:55%;
    top:40%;
}

#gift{
    display:none;
    position:absolute;
    left:50%;
    top:58%;
    transform:translate(-50%,-50%);
    width:320px;
    max-width:85vw;
    border-radius:20px;
    box-shadow:0 12px 30px rgba(0,0,0,0.25);
}

.show{
    display:block !important;
    animation:pop .8s ease;
}

@keyframes pop{
    0%{transform:translate(-50%,-50%) scale(0.2); opacity:0;}
    70%{transform:translate(-50%,-50%) scale(1.1); opacity:1;}
    100%{transform:translate(-50%,-50%) scale(1); opacity:1;}
}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing">
    <h1>💖 Buon Anniversario 💖</h1>
    <p>Ho preparato una piccola sorpresa per te...</p>
    <button id="startBtn">Scopri</button>
</div>

<!-- MUSICA (puoi cambiarla) -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1f3b8b5.mp3?filename=soft-piano-ambient-110397.mp3" type="audio/mpeg">
</audio>

<!-- MAIN -->
<div id="main">

<h1>💖 Vuoi scoprire il tuo regalo? 💖</h1>

<div id="area">

    <button id="si">Sì</button>
    <button id="no">No</button>

    <img id="gift" src="IMG_3842.jpeg" alt="Regalo">

</div>

</div>

<script>

const landing = document.getElementById("landing");
const main = document.getElementById("main");
const startBtn = document.getElementById("startBtn");
const music = document.getElementById("music");

const si = document.getElementById("si");
const no = document.getElementById("no");
const gift = document.getElementById("gift");
const area = document.getElementById("area");

let fughe = 0;
const maxFughe = 4;

/* START */
startBtn.addEventListener("click", () => {
    landing.style.display = "none";
    main.style.display = "block";

    music.play().catch(()=>{});
});

/* bottone che scappa */
function sposta(){
    const rect = area.getBoundingClientRect();

    si.style.left = Math.random() * (rect.width - 140) + "px";
    si.style.top = Math.random() * (rect.height - 140) + "px";

    fughe++;
}

si.addEventListener("click", (e) => {
    if(fughe < maxFughe){
        e.preventDefault();
        sposta();
        return;
    }

    gift.classList.add("show");
});

no.addEventListener("click", (e)=>{
    e.preventDefault();
});

</script>

</body>
</html>
