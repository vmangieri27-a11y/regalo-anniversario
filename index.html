<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buon Anniversario</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ffd6e7,#fff5f8);
    overflow:hidden;
}

/* LANDING */
#landing{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    z-index:9999;
}

#landing h1{
    font-size:34px;
    margin-bottom:10px;
}

#landing p{
    font-size:18px;
    opacity:0.9;
}

#startBtn{
    margin-top:20px;
    padding:16px 34px;
    font-size:18px;
    border:none;
    border-radius:999px;
    background:white;
    color:#d63384;
    font-weight:bold;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

/* MAIN */
#main{
    display:none;
    height:100vh;
    text-align:center;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

h1{
    margin-top:50px;
    padding:0 20px;
    color:#d63384;
    font-size:28px;
}

#area{
    position:relative;
    width:100%;
    height:75vh;
}

/* BOTTONI */
button{
    position:absolute;
    padding:16px 32px;
    font-size:20px;
    border:none;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 6px 15px rgba(0,0,0,0.15);
}

#si{
    background:#28a745;
    color:white;
    left:35%;
    top:40%;
}

#no{
    background:#ff4d6d;
    color:white;
    left:55%;
    top:40%;
}

/* IMMAGINE */
#gift{
    display:none;
    position:absolute;
    left:50%;
    top:58%;
    transform:translate(-50%,-50%) scale(0.5);
    width:320px;
    max-width:85vw;
    border-radius:20px;
    box-shadow:0 12px 30px rgba(0,0,0,0.25);
}

.show{
    display:block !important;
    animation:pop 0.8s ease forwards;
}

@keyframes pop{
    0%{transform:translate(-50%,-50%) scale(0.2); opacity:0;}
    70%{transform:translate(-50%,-50%) scale(1.1); opacity:1;}
    100%{transform:translate(-50%,-50%) scale(1); opacity:1;}
}

/* CONFETTI */
.confetti{
    position:fixed;
    width:10px;
    height:10px;
    background:red;
    top:-10px;
    animation:fall 3s linear forwards;
    z-index:99999;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(720deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing">
    <h1>💖 Buon Anniversario 💖</h1>
    <p>Ho preparato qualcosa per te...</p>
    <button id="startBtn">Scopri</button>
</div>

<!-- MUSICA -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8b1f3b8b5.mp3?filename=soft-piano-ambient-110397.mp3" type="audio/mpeg">
</audio>

<!-- MAIN -->
<div id="main">

<h1>💖 Vuoi scoprire il tuo regalo? 💖</h1>

<div id="area">

    <button id="si">Sì</button>
    <button id="no">No</button>

    <img id="gift" src="IMG_3842.jpeg" alt="Regalo">

</div>

</div>

<script>

const landing = document.getElementById("landing");
const main = document.getElementById("main");
const startBtn = document.getElementById("startBtn");
const music = document.getElementById("music");

const si = document.getElementById("si");
const no = document.getElementById("no");
const gift = document.getElementById("gift");
const area = document.getElementById("area");

let fughe = 0;
const maxFughe = 4;

/* START + AUDIO */
startBtn.addEventListener("click", () => {

    landing.style.display = "none";
    main.style.display = "block";

    music.volume = 0.6;
    music.play().catch(()=>{});

});

/* bottone che scappa */
function sposta(){
    const rect = area.getBoundingClientRect();

    si.style.left = Math.random() * (rect.width - 140) + "px";
    si.style.top = Math.random() * (rect.height - 140) + "px";

    fughe++;
}

si.addEventListener("click", (e) => {

    if(fughe < maxFughe){
        e.preventDefault();
        sposta();
        return;
    }

    gift.classList.add("show");
    createConfetti();
});

/* NO disattivato */
no.addEventListener("click", e=>{
    e.preventDefault();
});

/* CONFETTI WOW */
function createConfetti(){
    for(let i=0;i<40;i++){
        const c = document.createElement("div");
        c.classList.add("confetti");
        c.style.left = Math.random()*100 + "vw";
        c.style.background = `hsl(${Math.random()*360},100%,70%)`;
        c.style.animationDuration = (2+Math.random()*2)+"s";
        document.body.appendChild(c);

        setTimeout(()=>c.remove(),4000);
    }
}

</script>

</body>
</html>
