<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regalo di Anniversario</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:linear-gradient(135deg,#ffe6f0,#fff);
    overflow:hidden;
    text-align:center;
}

h1{
    position:absolute;
    top:8%;
    width:100%;
    color:#d63384;
    font-size:22px;
    padding:0 10px;
}

#area{
    position:relative;
    width:100%;
    height:60vh;
}

button{
    position:absolute;
    padding:14px 28px;
    font-size:18px;
    border:none;
    border-radius:12px;
}

#si{
    background:#28a745;
    color:white;
    left:40%;
    top:40%;
}

#no{
    background:#dc3545;
    color:white;
    left:55%;
    top:40%;
}

#gift{
    display:none;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    max-width:200px;
    animation:pop .5s ease;
}

#gift2{
    display:none;
    position:absolute;
    top:65%;
    left:50%;
    transform:translate(-50%,-50%);
    max-width:200px;
    animation:pop .7s ease;
}

@keyframes pop{
    from{transform:translate(-50%,-50%) scale(0);}
    to{transform:translate(-50%,-50%) scale(1);}
}
</style>
</head>

<body>

<h1>Vuoi scoprire il tuo regalo di anniversario? 🎁</h1>

<div id="area">
    <button id="si">Sì</button>
    <button id="no">No</button>

    <img id="gift" src="https://upload.wikimedia.org/wikipedia/commons/9/9e/Tennis_racket_and_balls.jpg">
    <img id="gift2" src="https://upload.wikimedia.org/wikipedia/commons/9/9e/Tennis_racket_and_balls.jpg">
</div>

<script>
const si = document.getElementById("si");
const no = document.getElementById("no");
const gift = document.getElementById("gift");
const gift2 = document.getElementById("gift2");

let moves = 0;
const maxMoves = 5;

function moveButton(){
    if(moves >= maxMoves) return;

    const area = document.getElementById("area").getBoundingClientRect();

    const x = Math.random() * (area.width - 120);
    const y = Math.random() * (area.height - 80);

    si.style.left = x + "px";
    si.style.top = y + "px";

    moves++;
}

si.addEventListener("mouseover", moveButton);
si.addEventListener("touchstart", moveButton);

no.addEventListener("click", e=>{
    e.preventDefault();
});

si.addEventListener("click", ()=>{
    gift.style.display = "block";
    gift2.style.display = "block";
});
</script>

</body>
</html>
