<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Regalo di Anniversario</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ffe6f0,#fff);
    overflow:hidden;
    text-align:center;
}

h1{
    font-size:20px;
    color:#d63384;
    padding:0 15px;
    position:absolute;
    top:6%;
    width:100%;
}

#area{
    position:relative;
    width:100%;
    height:70vh;
}

/* BOTTONI */
button{
    position:absolute;
    padding:14px 26px;
    font-size:18px;
    border:none;
    border-radius:12px;
    touch-action: manipulation;
}

#si{
    background:#28a745;
    color:white;
    left:40%;
    top:45%;
}

#no{
    background:#dc3545;
    color:white;
    left:55%;
    top:45%;
}

/* IMMAGINE FINALE */
#gift{
    position:absolute;
    top:55%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:200px;
    max-width:70vw;
    opacity:0;
    transition:all .4s ease;
    z-index:9999;
}

/* quando appare */
#gift.show{
    transform:translate(-50%,-50%) scale(1);
    opacity:1;
}
</style>
</head>

<body>

<h1>Vuoi scoprire il tuo regalo di anniversario? 🎁</h1>

<div id="area">
    <button id="si">Sì</button>
    <button id="no">No</button>

    <!-- IMMAGINE -->
    <img id="gift" src="IMG_3842.jpeg" alt="regalo">
</div>

<script>
const si = document.getElementById("si");
const no = document.getElementById("no");
const gift = document.getElementById("gift");

let moves = 0;
const maxMoves = 4;

/* bottone che scappa */
function moveYes(){
    if(moves >= maxMoves) return;

    const area = document.getElementById("area").getBoundingClientRect();

    const x = Math.random() * (area.width - 120);
    const y = Math.random() * (area.height - 120);

    si.style.left = x + "px";
    si.style.top = y + "px";

    moves++;
}

/* mobile + desktop */
si.addEventListener("mouseover", moveYes);
si.addEventListener("touchstart", moveYes);

/* click finale */
si.addEventListener("click", ()=>{
    gift.classList.add("show");
});

/* NO disattivato */
no.addEventListener("click", e=>{
    e.preventDefault();
});
</script>

</body>
</html>
